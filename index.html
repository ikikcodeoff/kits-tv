<!-- <!DOCTYPE html> -->
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KITS TV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080b0a;--surface:#0f1410;--surface2:#161d17;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);--green:#00e5a0;--green2:#00ffb2;--gdim:rgba(0,229,160,.1);--text:#f2f5f3;--muted:#6b7d74;--red:#ff4f4f}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
header{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:1rem 2.5rem;border-bottom:1px solid var(--border);background:rgba(8,11,10,.95);backdrop-filter:blur(12px)}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-sub{font-size:.6rem;letter-spacing:.28em;color:var(--muted);text-transform:uppercase}
.live-badge{display:flex;align-items:center;gap:7px;border:1px solid rgba(255,79,79,.3);background:rgba(255,79,79,.08);border-radius:100px;padding:5px 14px 5px 9px;font-size:.68rem;font-weight:600;letter-spacing:.14em;color:var(--red);text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hero{position:relative;z-index:1;text-align:center;padding:3.5rem 2rem 3rem;border-bottom:1px solid var(--border);overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:600px;height:220px;background:radial-gradient(ellipse,rgba(0,229,160,.06) 0%,transparent 70%);pointer-events:none}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,6rem);letter-spacing:.04em;line-height:1;color:var(--text)}
.hero h1 em{font-style:normal;color:var(--green)}
.hero p{margin-top:.9rem;font-size:.78rem;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.section{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:3rem 2rem}
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:2rem;font-size:.67rem;letter-spacing:.26em;color:var(--muted);text-transform:uppercase}
.section-head::before{content:'';width:20px;height:2px;background:var(--green);flex-shrink:0}
.match-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1.25rem}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;animation:up .5s ease both;transition:border-color .2s}
.match-card:hover{border-color:rgba(0,229,160,.2)}
.match-card:nth-child(1){animation-delay:.05s}.match-card:nth-child(2){animation-delay:.13s}.match-card:nth-child(3){animation-delay:.21s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;display:block}
.player-wrap iframe{width:100%;height:100%;border:none;display:block}
.player-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--surface2);cursor:pointer;transition:background .15s}
.player-cover:hover{background:#1a2420}
.play-circle{width:54px;height:54px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;transition:transform .15s}
.player-cover:hover .play-circle{transform:scale(1.07)}
.play-circle svg{width:22px;fill:#080b0a;margin-left:3px}
.player-cover p{font-size:.72rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
.card-bar{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface2)}
.card-comp{font-size:.67rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}
.status-pill{font-size:.64rem;font-weight:600;letter-spacing:.1em;padding:3px 10px;border-radius:100px;border:1px solid transparent}
.status-pill.live{background:rgba(255,79,79,.1);color:var(--red);border-color:rgba(255,79,79,.25);animation:sblink 2s ease infinite}
.status-pill.upcoming{background:var(--gdim);color:var(--green);border-color:rgba(0,229,160,.25)}
.status-pill.finished{background:rgba(255,255,255,.04);color:var(--muted);border-color:var(--border)}
@keyframes sblink{0%,100%{opacity:1}50%{opacity:.5}}
.score-area{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.75rem;padding:1.75rem 1.5rem}
.team{display:flex;flex-direction:column;align-items:center;gap:10px}
.team-logo{width:62px;height:62px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
.team-logo img{width:42px;height:42px;object-fit:contain}
.team-init{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:var(--muted)}
.team-name{font-size:.8rem;font-weight:500;text-align:center;color:var(--text);line-height:1.3}
.score-mid{display:flex;flex-direction:column;align-items:center;gap:5px}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:3.2rem;letter-spacing:.04em;color:var(--text);line-height:1;display:flex;align-items:center;gap:4px}
.score-sep{color:var(--muted);font-size:2.2rem}
.score-time{font-size:.68rem;font-weight:600;color:var(--green);letter-spacing:.12em}
.card-foot{border-top:1px solid var(--border);padding:.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between}
.card-date{font-size:.7rem;color:var(--muted)}
.btn-watch{display:inline-flex;align-items:center;gap:7px;background:var(--green);color:#080b0a;border:none;border-radius:8px;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s,transform .1s}
.btn-watch:hover{background:var(--green2);transform:scale(1.02)}
.btn-watch svg{width:13px;fill:#080b0a}
footer{position:relative;z-index:1;text-align:center;padding:2rem;border-top:1px solid var(--border);font-size:.67rem;letter-spacing:.16em;color:var(--muted)}
footer strong{color:var(--green);font-weight:500}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.1em;color:#f2f5f3;line-height:1">KIT<span style="color:#00e5a0">S</span></div>
    <div class="logo-sub" style="margin-left:4px">TV · Sports en direct</div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>En direct</div>
</header>
<div class="hero">
  <h1>Regardez tous<br>les <em>matchs</em> live</h1>
  <p>Scores · Streaming · En temps réel</p>
</div>
<main class="section">
  <div class="section-head">Matchs du jour</div>
  <div class="match-grid" id="grid"></div>
</main>
<footer><strong>KITS TV</strong> &nbsp;·&nbsp; Tous droits réservés</footer>
<script>
const matches=[];
function ini(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function logoEl(t){return t.logo?'<img src="'+t.logo+'" alt="'+t.name+'">':"<div class='team-init'>"+ini(t.name)+"</div>";}
const lb={live:'● Live',upcoming:'À venir',finished:'Terminé'};
function play(id,url){
  const base=url.replace(/\/$/,'');
  document.getElementById('pc'+id).style.display='none';
  const f=document.getElementById('pf'+id);f.src=base+'/embed/video';f.style.display='block';
}
function card(m){
  const has=m.status==='live'&&m.owncastUrl;
  const player=has?'<div class="player-wrap"><div class="player-cover" id="pc'+m.id+'" onclick="play('+m.id+',\''+m.owncastUrl+'\')"><div class="play-circle"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div><p>Lancer le stream Owncast</p></div><iframe id="pf'+m.id+'" src="" allowfullscreen allow="autoplay" style="display:none"></iframe></div>':'';
  const sc=m.status==='upcoming'?"<div class='score-num' style='font-size:1.5rem;color:var(--muted)'>VS</div>":"<div class='score-num'><span>"+m.scoreA+"</span><span class='score-sep'>-</span><span>"+m.scoreB+"</span></div>";
  const btn=has?'<button class="btn-watch" onclick="play('+m.id+',\''+m.owncastUrl+'\')"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Regarder</button>':"<a class='btn-watch' href='"+m.link+"' target='_blank'><svg viewBox='0 0 24 24'><path d='M8 5v14l11-7z'/></svg>Regarder</a>";
  return '<article class="match-card">'+player+'<div class="card-bar"><span class="card-comp">'+m.competition+'</span><span class="status-pill '+m.status+'">'+lb[m.status]+'</span></div><div class="score-area"><div class="team"><div class="team-logo">'+logoEl(m.teamA)+'</div><div class="team-name">'+m.teamA.name+'</div></div><div class="score-mid">'+sc+(m.time?'<div class="score-time">'+m.time+'</div>':'')+'</div><div class="team"><div class="team-logo">'+logoEl(m.teamB)+'</div><div class="team-name">'+m.teamB.name+'</div></div></div><div class="card-foot"><span class="card-date">'+m.date+'</span>'+btn+'</div></article>';
}
document.getElementById('grid').innerHTML=matches.length?matches.map(card).join(''):'<p style="color:var(--muted);text-align:center;grid-column:1/-1;padding:4rem">Aucun match configuré.</p>';
</script>
</body>
</html>
